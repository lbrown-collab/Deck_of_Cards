<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deck of Cards</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Deck of Cards</h1>

    <div class="controls">
      <button id="draw-btn">Draw Card</button>
      <button id="shuffle-btn">Shuffle Deck</button>
      <p id="cards-remaining">Cards remaining: 52</p>
      <p id="coint-count"> coins:50</p>
    </div>

    <div id="card-display" class="card-display">
      <p class="placeholder">Press "Draw Card" to begin</p>
    </div>
   <div id="guess-section" class="guess-selection hidden">
      <button id="higher-btn">▲  Higher</button>
      <button id="lower-btn">▼  Lower</button>
    </div>
   
   <div id="result-message" class="results-message"></div>
   
   <div id="drawn-cards" class="drawn-cards"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
